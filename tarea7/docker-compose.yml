networks:
  lakehouse-net:
    driver: bridge

services:
  retailx:
    build: .
    container_name: retailx_dataops_spark
    working_dir: /app
    networks:
      - lakehouse-net
    volumes:
      - ./:/app
    environment:
      - PYTHONPATH=/app
      - PYSPARK_PYTHON=python
      - PYSPARK_DRIVER_PYTHON=python
    command: tail -f /dev/null

  # Perfil opcional alineado al laboratorio Canva (Spark Master UI :8080)
  spark-master:
    profiles: ["cluster"]
    image: bitnami/spark:3.5
    container_name: spark-master
    networks:
      - lakehouse-net
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"

  spark-worker:
    profiles: ["cluster"]
    image: bitnami/spark:3.5
    container_name: spark-worker
    networks:
      - lakehouse-net
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
